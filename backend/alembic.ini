# alembic.ini — Alembic configuration for activia-trace backend.
# DATABASE_URL is resolved from environment in env.py; this value is a fallback.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Override DATABASE_URL via environment variable in production.
sqlalchemy.url = postgresql+asyncpg://trace_user:trace_pass@localhost:5432/trace_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
